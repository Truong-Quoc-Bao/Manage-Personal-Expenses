<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Money Guard Dashboard - AI của Bảo</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Thư viện vẽ biểu đồ -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Thư viện render markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div class="app-wrapper">
      <!-- PHẦN 1: DASHBOARD BÊN TRÁI -->
      <div class="dashboard-container">
        <div class="dashboard-header">
          <h1>📊 Tổng quan tài chính</h1>
          <p id="current-date"></p>
        </div>

        <div class="balance-cards">
          <div class="card balance">
            <span>💰 Số dư hiện tại</span>
            <h2 id="total-balance">0đ</h2>
          </div>
          <div class="income-expense">
            <div class="card income">
              <span>📈 Thu nhập tháng này</span>
              <h3 id="total-income">0đ</h3>
            </div>
            <div class="card expense">
              <span>📉 Chi tiêu tháng này</span>
              <h3 id="total-expense">0đ</h3>
            </div>
          </div>
        </div>

        <div
          class="bank-link-card"
          style="
            padding: 20px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            text-align: center;
          "
        >
          <h3 style="margin-bottom: 10px; font-size: 16px">🏦 Kết nối ngân hàng</h3>
          <p style="font-size: 13px; color: #666; margin-bottom: 15px">
            Liên kết để Moni tự động ghi sổ mỗi khi bạn quẹt thẻ.
          </p>

          <!-- NÚT CHÍNH CỦA BẢO -->
          <button
            id="btn-link"
            onclick="startLinking()"
            class="btn-primary"
            style="width: 100%; cursor: pointer"
          >
            🔗 Liên kết Ngân hàng ngay
          </button>
        </div>
        <div class="chart-section">
          <h3>Phân tích chi tiêu</h3>
          <div class="chart-container-wrapper">
            <!-- Biểu đồ -->
            <canvas id="expenseChart"></canvas>

            <div id="no-data-msg">
              <span style="font-size: 50px">🍃</span>
              <p style="color: #888; font-style: italic">Chưa có dữ liệu tháng này Bảo ơi...</p>
            </div>
          </div>
        </div>
      </div>

      <!-- PHẦN 2: CHATBOT BÊN PHẢI (Giữ nguyên logic của bạn) -->
      <div class="chat-container">
        <div class="chat-header">
          <h2>🤖 Trợ lý Money Guard</h2>

              alt="Telegram Icon"
            />
            Kết nối Telegram
          </a>
        </div>

        <div id="chat-messages" class="chat-messages"></div>

        <!-- Preview Ảnh -->
        <div id="image-preview-container" style="display: none">
          <img id="image-preview-img" src="" />
          <button type="button" id="remove-img-btn">×</button>
        </div>

        <form id="chat-form" class="chat-input">
          <input type="file" id="file-input" accept="image/*" style="display: none" />
          <button type="button" id="upload-btn">📷</button>
          <input
            type="text"
            id="user-input"
            placeholder="Hỏi Money Guard: 'Tháng này tiêu bao nhiêu?'"
            autocomplete="off"
          />
          <button type="submit">Gửi</button>
        </form>
      </div>
    </div>

    <!-- Script kết nối -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
  </body>
</html>
